<div class="landing-container">

  <!-- Top Bar -->
  <mat-toolbar color="primary" class="toolbar">
    <span class="app-title">Fuel Price Insight</span>
  </mat-toolbar>

  <!-- Hero Section -->
  <div class="hero">

    <div class="hero-content">

      <h1 class="main-title">Track Fuel Prices Smartly</h1>

      <p class="subtitle">
        Get real-time fuel prices, AI-based predictions, and insights 
        to make better decisions.
      </p>

      <div class="actions">
        <button mat-stroked-button color="primary" (click)="goToLogin()">
          Login
        </button>

        <button mat-stroked-button color="primary" (click)="goToSignup()">
          Sign Up
        </button>
      </div>

    </div>

  </div>

</div>
