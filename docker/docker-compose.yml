services:
  postgres:
    image:  postgres:18.3
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: fuel_price_insight
    volumes:
      - postgres_data:/var/lib/postgresql
    secrets:
      - pg_password

  rabbitmq:
    image: rabbitmq:4.2.2-management
    container_name: rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: csh_rabbit
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  postgres_data:
  rabbitmq-data:
    driver: local

secrets:
  pg_password:
    file: ../secrets/pg_admin_pass.txt
