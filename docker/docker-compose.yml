services:
  postgres:
    image:  postgres:18.3
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: fuel_price_insight
    volumes:
      - postgres_data:/var/lib/postgresql
    secrets:
      - pg_password

  rabbitmq:
    image: rabbitmq:4.2.2-management
    container_name: rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: csh_rabbit
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  zipkin:
    image: ghcr.io/openzipkin/zipkin-slim@sha256:2dc7ab63391b79a1ad02db814d0bc98b60e1874742089131a2c12cef670cfa27
    container_name: zipkin
    # Environment settings are defined here https://github.com/openzipkin/zipkin/blob/master/zipkin-server/README.md#environment-variables
    environment:
      - STORAGE_TYPE=mem
      # Uncomment to enable self-tracing
      # - SELF_TRACING_ENABLED=true
      # Uncomment to increase heap size
      # - JAVA_OPTS=-Xms128m -Xmx128m -XX:+ExitOnOutOfMemoryError
    ports:
      # Port used for the Zipkin UI and HTTP Api
      - 9411:9411
    # Uncomment to enable debug logging
    # command: --logging.level.zipkin2=DEBUG

volumes:
  postgres_data:
  rabbitmq-data:
    driver: local

secrets:
  pg_password:
    file: ../secrets/pg_admin_pass.txt
